<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="RemindMe Pro - Smart multi-fire reminder app">
    <meta name="theme-color" content="#1A1A2E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>RemindMe Pro v2</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link type="image/png" rel="icon" href="./assets/icons/icons8-alarm-96.png">
</head>

<body>
    <div id="app">
        <header id="app-header">
            <h2 id="header-title">RemindMe Pro</h2>
            
        </header>
        <main id="app-content"></main>
        <nav id="bottom-nav">
            <button class="nav-btn active" data-page="home"><span class="nav-icon">🏠</span><span
                    class="nav-label">Home</span></button>
            <button class="nav-btn" data-page="categories"><span class="nav-icon">📁</span><span
                    class="nav-label">Categories</span></button>
            <button class="nav-btn" data-page="calendar"><span class="nav-icon">📅</span><span
                    class="nav-label">Calendar</span></button>
            <button class="nav-btn" data-page="settings"><span class="nav-icon">⚙️</span><span
                    class="nav-label">Settings</span></button>
        </nav>
        <button id="fab" class="fab" aria-label="Create new reminder">+</button>
    </div>
    <dialog id="task-dialog">
        <div class="dialog-handle"></div>
        <h2 class="dialog-title">New Reminder</h2>
        <form id="task-form">
            <div class="form-group"><label for="task-title">Title *</label><input type="text" id="task-title" required
                    placeholder="What do you need to remember?" autocomplete="off"></div>
            <div class="form-group"><label for="task-desc">Description</label><textarea id="task-desc"
                    placeholder="Add details (optional)" rows="2"></textarea></div>
            <div class="form-row">
                <div class="form-group flex-1"><label for="task-date">Date & Time *</label><input type="datetime-local"
                        id="task-date" required></div>
                <div class="form-group"><label for="task-priority">Priority</label><select id="task-priority">
                        <option value="low">🟢 Low</option>
                        <option value="medium" selected>🟡 Medium</option>
                        <option value="high">🟠 High</option>
                        <option value="critical">🔴 Critical</option>
                    </select></div>
            </div>
            <div class="form-group"><label for="task-category">Category</label><select id="task-category">
                    <option value="general">General</option>
                    <option value="work">💼 Work</option>
                    <option value="personal">🏠 Personal</option>
                    <option value="health">💊 Health</option>
                    <option value="study">📚 Study</option>
                    <option value="finance">💰 Finance</option>
                </select></div>
            <div class="form-group"><label for="task-reminders">Reminder Count: <strong
                        id="reminder-count-display">3</strong></label><input type="range" id="task-reminders" min="1"
                    max="20" value="3">
                <div class="range-labels"><span>1</span><span>10</span><span>20</span></div>
            </div>
            <div class="form-group"><label for="task-interval">Interval Between Reminders</label><select
                    id="task-interval">
                    <option value="60000">Every 1 minutes</option>
                    <option value="120000" selected>Every 2 minutes</option>
                    <option value="180000">Every 3 minutes</option>
                    <option value="300000">Every 5 minutes</option>
                    <option value="900000">Every 15 minutes</option>
                    <option value="1800000">Every 30 minutes</option>
                    <option value="3600000">Every 1 hour</option>
                </select></div>
            <div class="form-group"><label class="checkbox-label"><input type="checkbox" id="task-until-done"><span>🔁
                        Remind Until Done</span></label></div>
            <div class="form-group"><label for="task-snooze-max">Max Snooze Count</label><select id="task-snooze-max">
                    <option value="3" selected>3 times</option>
                    <option value="5">5 times</option>
                    <option value="10">10 times</option>
                    <option value="0">No snooze</option>
                </select></div>
            <div class="form-actions"><button type="submit" class="btn btn-primary">💾 Save Reminder</button><button
                    type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button></div>
        </form>
    </dialog>
    <dialog id="confirm-dialog">
        <div class="confirm-content">
            <h3>Delete Reminder?</h3>
            <p>This action cannot be undone.</p>
            <div class="form-actions"><button id="confirm-delete-btn" class="btn btn-danger">🗑️ Delete</button><button
                    id="confirm-cancel-btn" class="btn btn-secondary">Cancel</button></div>
        </div>
    </dialog>
    <div id="toast" class="toast hidden"></div>
    <script type="module" src="js/app.js"></script>
</body>

</html>
